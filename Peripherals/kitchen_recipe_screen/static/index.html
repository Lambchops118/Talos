<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kitchen Recipe Screen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="screen-shell">
    <div class="screen-bezel"></div>
    <div class="crt-screen">
      <div class="scanlines"></div>
      <div class="screen-noise"></div>
      <div class="screen-content">
        <header class="topbar panel">
          <div class="topbar-block">
            <div class="chip-label">LINK</div>
            <div id="link-pill" class="pill">SYNCING</div>
          </div>
          <div class="topbar-block">
            <div class="chip-label">LOCAL TIME</div>
            <div id="clock" class="clock">--:--</div>
          </div>
          <div class="topbar-block timer-topbar">
            <div class="chip-label">TIMER</div>
            <div class="timer-inline">
              <div class="timer-inline-head">
                <span id="timer-label" class="timer-label">Prep timer</span>
                <span id="timer-state" class="panel-meta">IDLE</span>
              </div>
              <div id="timer-display" class="timer-display">15:00</div>
            </div>
          </div>
          <div class="topbar-block">
            <div class="chip-label">SERVINGS</div>
            <div id="servings" class="clock servings-clock">4 servings</div>
          </div>
        </header>

        <section class="recipe-hero panel">
          <h1 id="title" class="recipe-title"></h1>
          <p id="subtitle" class="recipe-subtitle"></p>
        </section>

        <main class="dashboard">
          <section class="panel ingredients-panel">
            <div class="panel-header">
              <span>INGREDIENTS</span>
              <span id="ingredients-count" class="panel-meta">0 items</span>
            </div>
            <ul id="ingredients-list" class="ingredient-list"></ul>
          </section>

          <section class="panel steps-panel">
            <div class="panel-header">
              <span>STEPS</span>
              <span id="steps-count" class="panel-meta">0 steps</span>
            </div>
            <ol id="steps-list" class="step-list"></ol>
          </section>

          <section class="panel notes-panel">
            <div class="panel-header">
              <span>NOTES</span>
              <span class="panel-meta">LIVE</span>
            </div>
            <ul id="notes-list" class="notes-list"></ul>
          </section>
        </main>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
